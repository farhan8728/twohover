    <!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
.mystyle {
  width: 20px;
  height: 20px;
  background-color: coral;
  color: white;
  font-size: 25px;
  box-sizing: border-box;
  margin-left:50px;
  margin-top: -70px;
  border-top-left-radius: 10px;
  border-bottom-left-radius: 10px;
}

.mystyletwo {
  width: 20px;
  height: 20px;
  background-color: coral;
  color: white;
  font-size: 25px;
  box-sizing: border-box;
  margin-left:75px;
  margin-top: -20px;
  border-top-left-radius: 10px;
  border-bottom-left-radius: 10px;
}
</style>
</head>
<body>

<p>Click the "Try it" button to add the "mystyle" class to the DIV element:</p>

<a href="#" onmouseover="myFunctionone()" onmouseleave="leaveone()">Home</a> <br> <br>
<a href="#" onmouseover="myFunctiontwo()" onmouseleave="leavetwo()">About Us</a>


<div id="myDIV">

</div>

<script>

function myFunctionone() {
   var element = document.getElementById("myDIV");
   element.classList.add("mystyle");
}

function leaveone(){
  var element = document.getElementById("myDIV");
  element.classList.remove("mystyle");
}





function myFunctiontwo() {
   var element = document.getElementById("myDIV");
   element.classList.add("mystyletwo");
}

function leavetwo(){
  var element = document.getElementById("myDIV");
  element.classList.remove("mystyletwo");
}


</script>

</body>
</html>
